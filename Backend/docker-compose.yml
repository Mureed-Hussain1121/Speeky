services:
  db:
    image: postgres:16-alpine
    container_name: speeky_onboarding_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: speeky
      POSTGRES_PASSWORD: speeky
      POSTGRES_DB: speeky_onboarding
    ports:
      - "5432:5432"
    volumes:
      - speeky_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speeky -d speeky_onboarding"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  speeky_pgdata:
